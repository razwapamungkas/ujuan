<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Info Cuaca</title>
    <link rel="stylesheet" href="style.css" />
  </head>
    <body class="light-theme" id="bodiAplikasi">
      <h2>Info Cuaca</h2>

      <button onclick="gantiTema()">Tema</button>
      <hr />

      <div class="input-grup">
        <input type="text" id="inputKota" placeholder="Ketik nama kota..." />
        <button onclick="cariCuaca()">Cari</button>
        <button onclick="ambilLokasiSaya()">Gunakan Lokasi Saya</button>
      </div>

      <div class="satuan-grup">
        Satuan:
        <button onclick="ubahSatuan('C')">°C</button>
        <button onclick="ubahSatuan('F')">°F</button>
      </div>

      <div
        id="loadingState"
        style="display: none; font-weight: bold"
      >
        Sedang mengambil data...
      </div>
      <div id="pesanError" class="error-msg"></div>

      <div id="tampilanCuaca" class="box-cuaca" style="display: none">
        <div style="display: flex; justify-content: space-between">
          <h3 id="namaKotaNegara">Nama Kota</h3>
          <button
            onclick="tambahKeFavorit()"
          >
            Tambah Ke Favorit
          </button>
        </div>

        <div id="weatherIcon" style="font-size: 40px">☀️</div>
        <h1 id="angkaSuhu">0°C</h1>
        <p id="kondisiCuaca">Kondisi</p>

        <hr />

        <p><b>Terasa Seperti:</b> <span id="feelsLike">0</span></p>
        <p><b>Kelembapan:</b> <span id="humidity">0</span>%</p>
        <p><b>Kecepatan Angin:</b> <span id="windSpeed">0</span> m/s</p>
        <p><b>Tekanan Udara:</b> <span id="pressure">0</span> hPa</p>
        <p><b>Jarak Pandang:</b> <span id="visibility">0</span> m</p>

        <hr />

        <h4>Informasi Tambahan:</h4>
        <p><b>Suhu Min:</b> <span id="minTemp">0</span></p>
        <p><b>Suhu Max:</b> <span id="maxTemp">0</span></p>
        <p><b>Matahari Terbit:</b> <span id="sunrise">00:00</span></p>
        <p><b>Matahari Terbenam:</b> <span id="sunset">00:00</span></p>
      </div>

      <hr />

      <h3>Kota Favorit:</h3>
      <ul id="daftarFavorit"></ul>

      <script src="script.js"></script>
    </body>
  </html>
</html>
